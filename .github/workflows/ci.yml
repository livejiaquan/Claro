name: ci

on:
  push:
    branches: [main]
    paths: ["desktop/**", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["desktop/**", ".github/workflows/ci.yml"]

jobs:
  desktop:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Frontend build
        working-directory: desktop
        run: |
          npm ci
          npm run build

      - name: Rust tests
        working-directory: desktop/src-tauri
        run: cargo test --lib

      # debug bundle：驗證打包鏈（Info.plist 合併、icon、capabilities）不會等到發版才炸；
      # debug profile 與上面測試共用編譯快取，成本可控
      - name: Tauri bundle (debug)
        working-directory: desktop
        run: npm run tauri build -- --debug
