name: ci

on:
  push:
    branches: [main]
    paths: ["desktop/**", "prototype/mic_indicator.swift", ".github/workflows/ci.yml", ".github/workflows/release.yml"]
  pull_request:
    paths: ["desktop/**", "prototype/mic_indicator.swift", ".github/workflows/ci.yml", ".github/workflows/release.yml"]

jobs:
  desktop:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable, 2026-06-30

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: desktop/src-tauri

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Frontend build
        working-directory: desktop
        run: |
          npm ci
          npm run build

      - name: Rust tests
        working-directory: desktop/src-tauri
        run: cargo test --lib

      # examples 是文件指定的驗證入口（transcribe_file/builtin_polish…），
      # cargo test --lib 與 bundle 都不編它們——不查會在使用者手上才編譯失敗
      - name: Rust check (all targets incl. examples)
        working-directory: desktop/src-tauri
        run: cargo check --all-targets

      # debug bundle：驗證打包鏈（Info.plist 合併、icon、capabilities）不會等到發版才炸；
      # debug profile 與上面測試共用編譯快取，成本可控
      - name: Tauri app bundle (debug)
        working-directory: desktop
        run: npm run tauri build -- --debug --bundles app

      - name: Assert macOS bundle contract
        run: |
          APP="desktop/src-tauri/target/debug/bundle/macos/Claro.app"
          MAIN="$APP/Contents/MacOS/claro"
          SIDECAR="$APP/Contents/MacOS/mic_indicator"
          test -d "$APP"
          test -x "$MAIN"
          test -x "$SIDECAR"
          test "$(plutil -extract LSMinimumSystemVersion raw "$APP/Contents/Info.plist")" = "11.0"
          [[ "$(file "$MAIN")" =~ arm64|x86_64 ]]
          [[ "$(file "$SIDECAR")" =~ arm64|x86_64 ]]
          MAIN_LOAD_COMMANDS="$(otool -l "$MAIN")"
          SIDECAR_LOAD_COMMANDS="$(otool -l "$SIDECAR")"
          grep -q 'minos 11.0' <<< "$MAIN_LOAD_COMMANDS"
          grep -q 'minos 11.0' <<< "$SIDECAR_LOAD_COMMANDS"
          check_runtime_deps() {
            local binary="$1"
            otool -L "$binary" | tail -n +2 | awk '{print $1}' | while IFS= read -r dependency; do
              case "$dependency" in
                /System/Library/*|/usr/lib/*|@rpath/*|@loader_path/*|@executable_path/*) ;;
                *) echo "Unexpected non-system runtime dependency in $binary: $dependency" >&2; exit 1 ;;
              esac
            done
          }
          check_runtime_deps "$MAIN"
          check_runtime_deps "$SIDECAR"
