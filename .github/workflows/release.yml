name: release-candidate

on:
  workflow_dispatch:
    inputs:
      target:
        description: macOS architecture to stage
        required: true
        type: choice
        default: aarch64-apple-darwin
        options:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
          - universal-apple-darwin

# P0 只產生經簽章、公證、驗證的候選檔，不建立或修改 GitHub Release。
permissions:
  contents: read

concurrency:
  group: release-candidate-${{ github.ref }}-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  stage-macos:
    runs-on: macos-latest
    environment: release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Require a version-matching tag
        run: |
          test "$GITHUB_REF_TYPE" = "tag"
          VERSION="$(node -p "require('./desktop/src-tauri/tauri.conf.json').version")"
          test "$GITHUB_REF_NAME" = "v$VERSION"

      - name: Require external signing and notarization secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            KEYCHAIN_PASSWORD \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            APPLE_SIGNING_IDENTITY
          do
            test -n "${!name:-}" || { echo "Missing required release secret: $name" >&2; exit 1; }
          done

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable, 2026-06-30
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: desktop/src-tauri

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Import Developer ID certificate into an ephemeral keychain
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/claro-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/claro-signing.keychain-db"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          EXISTING_KEYCHAINS="$(security list-keychains -d user | tr -d '\"')"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -F "$APPLE_SIGNING_IDENTITY"

      - name: Build, sign, and notarize candidate
        working-directory: desktop
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # 與 ci.yml 一致：Claro 不用 llama.cpp 的 HTTPS 下載，確定性編
          # 無 SSL 的 cpp-httplib（runner 沒有 OpenSSL 標頭；發行產物也
          # 不該因 builder 有無 openssl 而異）
          CMAKE_DISABLE_FIND_PACKAGE_OpenSSL: "TRUE"
        run: |
          export RUSTFLAGS="--remap-path-prefix=$GITHUB_WORKSPACE=/workspace --remap-path-prefix=$HOME/.cargo=/cargo"
          npm run tauri build -- --target "${{ inputs.target }}" --bundles app,dmg

      - name: Verify app, sidecar, minimum OS, signature, and notarization
        run: |
          APP="$(find desktop/src-tauri/target -type d -path '*/release/bundle/macos/Claro.app' -print -quit)"
          DMG="$(find desktop/src-tauri/target -type f -path '*/release/bundle/dmg/*.dmg' -print -quit)"
          test -n "$APP"
          test -n "$DMG"
          MAIN="$APP/Contents/MacOS/claro"
          SIDECAR="$APP/Contents/MacOS/mic_indicator"
          test -x "$MAIN"
          test -x "$SIDECAR"
          test "$(plutil -extract LSMinimumSystemVersion raw "$APP/Contents/Info.plist")" = "11.0"
          MAIN_LOAD_COMMANDS="$(otool -l "$MAIN")"
          SIDECAR_LOAD_COMMANDS="$(otool -l "$SIDECAR")"
          grep -q 'minos 11.0' <<< "$MAIN_LOAD_COMMANDS"
          grep -q 'minos 11.0' <<< "$SIDECAR_LOAD_COMMANDS"
          check_runtime_deps() {
            local binary="$1"
            otool -L "$binary" | tail -n +2 | awk '{print $1}' | while IFS= read -r dependency; do
              case "$dependency" in
                /System/Library/*|/usr/lib/*|@rpath/*|@loader_path/*|@executable_path/*) ;;
                *) echo "Unexpected non-system runtime dependency in $binary: $dependency" >&2; exit 1 ;;
              esac
            done
          }
          check_runtime_deps "$MAIN"
          check_runtime_deps "$SIDECAR"
          if strings "$MAIN" | grep -F "$GITHUB_WORKSPACE"; then
            echo "Main binary leaks the GitHub workspace path" >&2
            exit 1
          fi
          if strings "$MAIN" | grep -F "$HOME/.cargo"; then
            echo "Main binary leaks the Cargo home path" >&2
            exit 1
          fi

          MAIN_ARCHS="$(lipo -archs "$MAIN")"
          SIDECAR_ARCHS="$(lipo -archs "$SIDECAR")"
          case "${{ inputs.target }}" in
            aarch64-apple-darwin)
              test "$MAIN_ARCHS" = "arm64"
              test "$SIDECAR_ARCHS" = "arm64"
              ;;
            x86_64-apple-darwin)
              test "$MAIN_ARCHS" = "x86_64"
              test "$SIDECAR_ARCHS" = "x86_64"
              ;;
            universal-apple-darwin)
              grep -qw arm64 <<< "$MAIN_ARCHS"
              grep -qw x86_64 <<< "$MAIN_ARCHS"
              grep -qw arm64 <<< "$SIDECAR_ARCHS"
              grep -qw x86_64 <<< "$SIDECAR_ARCHS"
              ;;
          esac

          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign --verify --strict --verbose=2 "$SIDECAR"
          spctl --assess --type execute --verbose=4 "$APP"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$DMG"
          xcrun stapler validate "$APP"
          xcrun stapler validate "$DMG"

          ditto -c -k --sequesterRsrc --keepParent "$APP" "$RUNNER_TEMP/Claro.app.zip"
          cp "$DMG" "$RUNNER_TEMP/Claro.dmg"

      - name: Upload verified release candidates
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Claro-${{ github.ref_name }}-${{ inputs.target }}
          path: |
            ${{ runner.temp }}/Claro.app.zip
            ${{ runner.temp }}/Claro.dmg
          if-no-files-found: error
          retention-days: 14

      - name: Remove ephemeral signing keychain
        if: always()
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/claro-signing.keychain-db"
          if test -f "$KEYCHAIN_PATH"; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
